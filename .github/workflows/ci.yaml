name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CGO_ENABLED: 0

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Build
      run: make build

    - name: Build WASM
      run: make wasm

    - name: Run tests
      run: make test-short

    - name: Run vet
      run: make vet

    - name: Verify binary
      run: |
        test -x ./bin/trajan || (echo "Binary not created" && exit 1)
        ./bin/trajan --help
