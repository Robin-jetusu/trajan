syntax = "proto3";

package qwak.admiral.secret.v0;

option go_package = "github.com/praetorian-inc/trajan/pkg/jfrog/proto;proto";

import "google/protobuf/timestamp.proto";

// SecretService provides secret management operations (Admiral control plane)
service SecretService {
  rpc ListAccountSecrets(ListAccountSecretsRequest) returns (ListAccountSecretsResponse);
}

message ListAccountSecretsRequest {}

message ListAccountSecretsResponse {
  AccountSecrets account_secrets = 1;
}

message AccountSecrets {
  repeated EnvironmentSecretMetadata secrets = 1;
}

message EnvironmentSecretMetadata {
  EnvironmentSecretIdentifier identifier = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp last_updated_at = 3;
}

message EnvironmentSecretIdentifier {
  string name = 1;
  string environment_id = 2;
}
