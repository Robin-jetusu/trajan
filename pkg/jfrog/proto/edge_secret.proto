syntax = "proto3";

package qwak.secret.service;

option go_package = "github.com/praetorian-inc/trajan/pkg/jfrog/proto;proto";

// EdgeSecretService provides secret value operations
service EdgeSecretService {
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
}

message GetSecretRequest {
  string name = 1;
}

message GetSecretResponse {
  string name = 1;
  string value = 2;
}
